"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#A9B8FF)\
[ оң‘ ](bg:#A9B8FF fg:#1A1B27)\
[оӮҙ](bg:#7AA2F7 fg:#A9B8FF)\
$directory\
[оӮҙ](fg:#7AA2F7 bg:#454258)\
$git_branch\
$git_status\
[оӮҙ](fg:#454258 bg:#2A2734)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#2A2734 bg:#1A1B27)\
$time\
[оӮҙ ](fg:#1A1B27)\
\n$character"""

[directory]
style = "fg:#1A1B27 bg:#7AA2F7"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#454258"
format = '[[ $symbol $branch ](fg:#A9B8FF bg:#454258)]($style)'

[git_status]
style = "bg:#454258"
format = '[[($all_status$ahead_behind )](fg:#A9B8FF bg:#454258)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#2A2734"
format = '[[ $symbol ($version) ](fg:#A9B8FF bg:#2A2734)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#2A2734"
format = '[[ $symbol ($version) ](fg:#A9B8FF bg:#2A2734)]($style)'

[aws]
format = '[$symbol$region]($style) '
style = 'bold fg:#7AA2F7'
symbol = "рҹ…°"

[golang]
symbol = "оҳ§"
style = "bg:#2A2734"
format = '[[ $symbol ($version) ](fg:#A9B8FF bg:#2A2734)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#2A2734"
format = '[[ $symbol ($version) ](fg:#A9B8FF bg:#2A2734)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1A1B27"
format = '[[пҗә $time ](fg:#BBC6F6 bg:#1A1B27)]($style)'
